version: '3.8'

services:
  norn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: norn-app
    ports:
      - "8000:8000"
    environment:
      # Optional AWS Credentials for Amazon Nova explicitly passed
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - NOVA_ACT_API_KEY=${NOVA_ACT_API_KEY:-}
    volumes:
      # Mount logs to host machine for persistence
      - ./norn_logs:/app/norn_logs
    restart: unless-stopped
