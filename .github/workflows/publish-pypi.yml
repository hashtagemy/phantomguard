name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "norn/**"
      - "pyproject.toml"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if version already exists on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/norn-sdk/${{ steps.version.outputs.version }}/json)
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.version }} already on PyPI — skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.version }} not on PyPI — will publish"
          fi

      - name: Build package
        if: steps.check.outputs.exists == 'false'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Create git tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}" || true

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Norn v${{ steps.version.outputs.version }}
          body: |
            ## Norn v${{ steps.version.outputs.version }}

            ### Installation
            ```bash
            pip install norn-sdk==${{ steps.version.outputs.version }}
            ```

            ### Upgrade
            ```bash
            pip install --upgrade norn-sdk
            ```
          draft: false
          prerelease: false

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "## Skipped — v${{ steps.version.outputs.version }} already on PyPI" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Published v${{ steps.version.outputs.version }} to PyPI" >> $GITHUB_STEP_SUMMARY
            echo "- **PyPI:** https://pypi.org/project/norn-sdk/${{ steps.version.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
          fi
